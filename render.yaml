services:
  - type: web
    name: gusto-system-api
    env: docker
    plan: free
    region: singapore
    autoDeploy: true

    # Render sẽ tự dùng Dockerfile ở thư mục gốc
    dockerfilePath: ./Dockerfile
    dockerContext: ./

    # Health check (Render gọi endpoint này để kiểm tra container)
    healthCheckPath: /health

    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production